<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tính điểm trung bình môn năm học</title>

  <style>

    *{
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      margin:0;
      padding:20px;
      background:#f3f4f6;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:white;
      padding:35px;
      border-radius:20px;
      box-shadow:0 0 18px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      margin-bottom:35px;
      font-size:44px;
      color:#111827;
    }

    .section{
      margin-bottom:25px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-weight:bold;
      font-size:18px;
    }

    .radio-group{
      display:flex;
      align-items:center;
      gap:35px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .radio-item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .radio-item input{
      width:20px;
      height:20px;
      cursor:pointer;
    }

    .inputs{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(120px,1fr));
      gap:14px;
    }

    input[type="text"]{
      width:100%;
      padding:14px;
      border:2px solid #d1d5db;
      border-radius:14px;
      font-size:18px;
      outline:none;
      transition:0.2s;
    }

    input[type="text"]:focus{
      border-color:#2563eb;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:#2563eb;
      color:white;
      font-size:24px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
    }

    .result{
      margin-top:30px;
      background:#eef4ff;
      border-radius:18px;
      padding:25px;
      line-height:2;
      font-size:20px;
    }

    .error{
      margin-top:15px;
      color:red;
      font-size:18px;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }

    .note{
      margin-top:8px;
      color:#666;
      font-size:15px;
    }

    hr{
      margin:35px 0;
      border:none;
      border-top:2px solid #d1d5db;
    }

    .sub-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:20px;
      color:#111827;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Tính điểm trung bình môn năm học</h1>

  <!-- CHỌN CHẾ ĐỘ -->
  <div class="section">

    <label>Chọn chế độ tính:</label>

    <div class="radio-group">

      <label class="radio-item">
        <input type="radio" name="mainMode" value="1hk" checked>
        Tính điểm 1 học kỳ
      </label>

      <label class="radio-item">
        <input type="radio" name="mainMode" value="year">
        Tính điểm cả năm
      </label>

    </div>

  </div>

  <!-- PHẦN CẢ NĂM -->
  <div id="yearSection" class="hidden">

    <div class="section">

      <label>Điểm TBM HKI:</label>

      <input
        type="text"
        id="hki"
        placeholder="Nhập điểm TBM HKI"
      >

    </div>

    <hr>

    <div class="sub-title">
      Nhập điểm HKII
    </div>

    <!-- CHỌN CÁCH NHẬP HKII -->
    <div class="section">

      <div class="radio-group">

        <label class="radio-item">
          <input
            type="radio"
            name="hkiiMode"
            value="detail"
            checked
          >
          Nhập điểm HKII
        </label>

        <label class="radio-item">
          <input
            type="radio"
            name="hkiiMode"
            value="tbm"
          >
          Nhập điểm TBM HKII
        </label>

      </div>

    </div>

    <!-- NHẬP TBM HKII -->
    <div id="tbmHKIISection" class="hidden">

      <div class="section">

        <label>Điểm TBM HKII:</label>

        <input
          type="text"
          id="hkii"
          placeholder="Nhập điểm TBM HKII"
        >

      </div>

    </div>

  </div>

  <!-- NHẬP CHI TIẾT -->
  <div id="detailInputs">

    <div class="section">

      <label>Điểm KTTX (tối đa 5 cột):</label>

      <div class="inputs">

        <input type="text" class="kttx" placeholder="KTTX 1">
        <input type="text" class="kttx" placeholder="KTTX 2">
        <input type="text" class="kttx" placeholder="KTTX 3">
        <input type="text" class="kttx" placeholder="KTTX 4">
        <input type="text" class="kttx" placeholder="KTTX 5">

      </div>

      <div class="note">
        Có thể nhập ít hơn 5 cột.
      </div>

    </div>

    <div class="section">

      <label>Điểm giữa kỳ (KTGK):</label>

      <input
        type="text"
        id="gk"
        placeholder="Nhập điểm giữa kỳ"
      >

    </div>

    <div class="section">

      <label>Điểm cuối kỳ (KTCK):</label>

      <input
        type="text"
        id="ck"
        placeholder="Nhập điểm cuối kỳ"
      >

    </div>

  </div>

  <button onclick="calculate()">
    Tính điểm
  </button>

  <div class="error" id="error"></div>

  <!-- KẾT QUẢ -->
  <div class="result hidden" id="result">

    <div>
      <b>Điểm TBM:</b>
      <span id="full"></span>
    </div>

    <div>
      <b>Điểm TBM (làm tròn 2 chữ số thập phân):</b>
      <span id="round2"></span>
    </div>

    <div>
      <b>Điểm TBM (làm tròn 1 chữ số thập phân):</b>
      <span id="round1"></span>
    </div>

  </div>

</div>

<script>

  const mainModes =
  document.querySelectorAll('input[name="mainMode"]');

  const hkiiModes =
  document.querySelectorAll('input[name="hkiiMode"]');

  const yearSection =
  document.getElementById("yearSection");

  const detailInputs =
  document.getElementById("detailInputs");

  const tbmHKIISection =
  document.getElementById("tbmHKIISection");

  // CẬP NHẬT GIAO DIỆN
  mainModes.forEach(radio => {

    radio.addEventListener("change", updateUI);

  });

  hkiiModes.forEach(radio => {

    radio.addEventListener("change", updateUI);

  });

  function updateUI(){

    const mainMode =
    document.querySelector('input[name="mainMode"]:checked').value;

    if(mainMode === "year"){

      yearSection.classList.remove("hidden");

      const hkiiMode =
      document.querySelector('input[name="hkiiMode"]:checked').value;

      if(hkiiMode === "tbm"){

        tbmHKIISection.classList.remove("hidden");

        detailInputs.classList.add("hidden");

      }else{

        tbmHKIISection.classList.add("hidden");

        detailInputs.classList.remove("hidden");

      }

    }else{

      yearSection.classList.add("hidden");

      tbmHKIISection.classList.add("hidden");

      detailInputs.classList.remove("hidden");

    }

  }

  // CHUYỂN INPUT THÀNH SỐ
  function normalizeScore(value){

    value = value.trim();

    if(value === ""){
      return null;
    }

    value = value.replace(",", ".");

    let num = parseFloat(value);

    if(isNaN(num)){
      return "invalid";
    }

    return num;

  }

  // KIỂM TRA ĐIỂM
  function checkScore(score){

    return score >= 0 && score <= 10;

  }

  // TÍNH TBM HK
  function calculateSemesterAverage(){

    const kttxInputs =
    document.querySelectorAll(".kttx");

    let scores = [];

    for(let input of kttxInputs){

      let score =
      normalizeScore(input.value);

      if(score === "invalid"){
        return "invalid";
      }

      if(score !== null){

        if(!checkScore(score)){
          return "range";
        }

        scores.push(score);

      }

    }

    const gk =
    normalizeScore(
      document.getElementById("gk").value
    );

    const ck =
    normalizeScore(
      document.getElementById("ck").value
    );

    if(gk === null || ck === null){
      return "missing";
    }

    if(gk === "invalid" || ck === "invalid"){
      return "invalid";
    }

    if(!checkScore(gk) || !checkScore(ck)){
      return "range";
    }

    let total = 0;

    scores.forEach(score => {

      total += score;

    });

    total += gk * 2;

    total += ck * 3;

    let n =
    scores.length + 2 + 3;

    return total / n;

  }

  // TÍNH ĐIỂM
  function calculate(){

    const errorDiv =
    document.getElementById("error");

    const resultDiv =
    document.getElementById("result");

    errorDiv.innerText = "";

    resultDiv.classList.add("hidden");

    const mainMode =
    document.querySelector('input[name="mainMode"]:checked').value;

    let tbm = 0;

    // TÍNH 1 HK
    if(mainMode === "1hk"){

      let semesterAverage =
      calculateSemesterAverage();

      if(semesterAverage === "missing"){

        errorDiv.innerText =
        "Vui lòng nhập đầy đủ điểm giữa kỳ và cuối kỳ.";

        return;

      }

      if(semesterAverage === "invalid"){

        errorDiv.innerText =
        "Có điểm không hợp lệ.";

        return;

      }

      if(semesterAverage === "range"){

        errorDiv.innerText =
        "Điểm không được nhỏ hơn 0 hoặc lớn hơn 10.";

        return;

      }

      tbm = semesterAverage;

    }

    // TÍNH CẢ NĂM
    else{

      const hki =
      normalizeScore(
        document.getElementById("hki").value
      );

      if(hki === null){

        errorDiv.innerText =
        "Vui lòng nhập điểm TBM HKI.";

        return;

      }

      if(hki === "invalid"){

        errorDiv.innerText =
        "Điểm TBM HKI không hợp lệ.";

        return;

      }

      if(!checkScore(hki)){

        errorDiv.innerText =
        "Điểm TBM HKI phải từ 0 đến 10.";

        return;

      }

      const hkiiMode =
      document.querySelector('input[name="hkiiMode"]:checked').value;

      let hkii = 0;

      // NHẬP TBM HKII
      if(hkiiMode === "tbm"){

        hkii =
        normalizeScore(
          document.getElementById("hkii").value
        );

        if(hkii === null){

          errorDiv.innerText =
          "Vui lòng nhập điểm TBM HKII.";

          return;

        }

        if(hkii === "invalid"){

          errorDiv.innerText =
          "Điểm TBM HKII không hợp lệ.";

          return;

        }

        if(!checkScore(hkii)){

          errorDiv.innerText =
          "Điểm TBM HKII phải từ 0 đến 10.";

          return;

        }

      }

      // NHẬP CHI TIẾT HKII
      else{

        hkii =
        calculateSemesterAverage();

        if(hkii === "missing"){

          errorDiv.innerText =
          "Vui lòng nhập đầy đủ điểm HKII.";

          return;

        }

        if(hkii === "invalid"){

          errorDiv.innerText =
          "Có điểm HKII không hợp lệ.";

          return;

        }

        if(hkii === "range"){

          errorDiv.innerText =
          "Điểm không được nhỏ hơn 0 hoặc lớn hơn 10.";

          return;

        }

      }

      tbm =
      (hki + (hkii * 2)) / 3;

    }

    // HIỂN THỊ KẾT QUẢ
    document.getElementById("full").innerText =
    Number(tbm.toFixed(5));

    document.getElementById("round2").innerText =
    tbm.toFixed(2);

    document.getElementById("round1").innerText =
    tbm.toFixed(1);

    resultDiv.classList.remove("hidden");

  }

</script>

</body>
</html>
